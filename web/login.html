<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>神州99 — 登录</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    background:#0a0e17;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    color:#e2e8f0;
  }
  .login-card {
    background:#131a2b;
    border:1px solid #1e293b;
    border-radius:16px;
    padding:40px 36px;
    width:380px;
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
  }
  .logo {
    text-align:center;
    margin-bottom:32px;
  }
  .logo h1 {
    font-size:28px;
    background:linear-gradient(135deg,#06b6d4,#8b5cf6);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    margin-bottom:6px;
  }
  .logo p {
    font-size:12px;
    color:#64748b;
  }
  .form-group {
    margin-bottom:20px;
  }
  .form-group label {
    display:block;
    font-size:12px;
    font-weight:600;
    color:#94a3b8;
    margin-bottom:6px;
    text-transform:uppercase;
    letter-spacing:0.5px;
  }
  .form-group input {
    width:100%;
    padding:12px 14px;
    background:#0f1724;
    border:1px solid #1e293b;
    border-radius:8px;
    color:#e2e8f0;
    font-size:14px;
    outline:none;
    transition:border-color 0.2s;
  }
  .form-group input:focus {
    border-color:#06b6d4;
  }
  .form-group input::placeholder {
    color:#475569;
  }
  .btn-login {
    width:100%;
    padding:12px;
    background:linear-gradient(135deg,#06b6d4,#8b5cf6);
    border:none;
    border-radius:8px;
    color:white;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
    transition:opacity 0.2s;
    margin-top:4px;
  }
  .btn-login:hover { opacity:0.9; }
  .btn-login:active { transform:scale(0.98); }
  .error {
    background:#1c1017;
    border:1px solid #7f1d1d;
    border-radius:8px;
    padding:10px 14px;
    margin-bottom:16px;
    font-size:12px;
    color:#fca5a5;
    display:none;
  }
  .footer {
    text-align:center;
    margin-top:24px;
    font-size:10px;
    color:#334155;
  }
</style>
</head>
<body>
<div class="login-card">
  <div class="logo">
    <h1>🚀 神州99</h1>
    <p>加密货币量化交易平台</p>
  </div>
  <div class="error" id="errorMsg"></div>
  <form onsubmit="doLogin(event)">
    <div class="form-group">
      <label>用户名</label>
      <input type="text" id="username" placeholder="请输入用户名" autocomplete="username" autofocus>
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password">
    </div>
    <button type="submit" class="btn-login">登 录</button>
  </form>
  <div class="footer">Shenzhou99 Quantitative Trading Platform</div>
</div>

<script>
async function doLogin(e) {
  e.preventDefault();
  const user = document.getElementById('username').value.trim();
  const pass = document.getElementById('password').value;
  const errEl = document.getElementById('errorMsg');
  errEl.style.display = 'none';

  if (!user || !pass) {
    errEl.textContent = '请输入用户名和密码';
    errEl.style.display = 'block';
    return;
  }

  try {
    const resp = await fetch('/api/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({username: user, password: pass})
    });
    const data = await resp.json();
    if (data.ok) {
      localStorage.setItem('sz99_token', data.token);
      window.location.href = '/';
    } else {
      errEl.textContent = data.error || '登录失败';
      errEl.style.display = 'block';
    }
  } catch(err) {
    errEl.textContent = '网络错误: ' + err.message;
    errEl.style.display = 'block';
  }
}

// 已登录则跳转
if (localStorage.getItem('sz99_token')) {
  window.location.href = '/';
}
</script>
</body>
</html>
